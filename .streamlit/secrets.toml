""")
    st.stop()

# ------------------ FETCH MOVIE FROM OMDB ------------------
def fetch_movie_data(title):
    url = f"http://www.omdbapi.com/?t={title}&apikey={OMDB_API_KEY}"
    res = requests.get(url)
    data = res.json()

    if data.get("Response") == "False":
        return None

    return {
        "title": data.get("Title"),
        "year": data.get("Year"),
        "genre": data.get("Genre"),
        "plot": data.get("Plot"),
        "actors": data.get("Actors"),
        "imdb": data.get("imdbRating")
    }

# ------------------ GROQ CLIENT ------------------
from openai import OpenAI

def get_groq_client():
    return OpenAI(
        api_key=GROQ_API_KEY,
        base_url="https://api.groq.com/openai/v1"
    )

# ------------------ AI ANALYSIS ------------------
def analyze_movie(movie):
    client = get_groq_client()

    system_prompt = """
You are a panel of elite film critics.

Give honest, realistic reviews.
Avoid giving high ratings unless truly deserved.
Most movies should score between 5–8 unless masterpiece or terrible.
Be specific and non-generic.
"""

    user_prompt = f"""
Movie: {movie['title']} ({movie['year']})
Genre: {movie['genre']}
Actors: {movie['actors']}
Plot: {movie['plot']}
IMDb: {movie['imdb']}

Write:
1) Critic Review
2) Devil's Advocate Review
3) Audience Reaction
4) Final Verdict with score out of 10
"""

    response = client.chat.completions.create(
        model="llama-3.3-70b-versatile",
        temperature=0.6,
        max_tokens=800,
        messages=[
            {"role": "system", "content": system_prompt},
            {"role": "user", "content": user_prompt}
        ]
    )

    return response.choices[0].message.content

# ------------------ SEARCH UI ------------------
movie_title = st.text_input("Enter movie or series name")

if st.button("Analyze"):
    if not movie_title:
        st.warning("Enter a title first.")
        st.stop()

    with st.spinner("Fetching movie..."):
        movie = fetch_movie_data(movie_title)

    if not movie:
        st.error("Movie not found.")
        st.stop()

    st.subheader(f"{movie['title']} ({movie['year']})")
    st.write("⭐ IMDb:", movie["imdb"])
    st.write(movie["plot"])

    with st.spinner("AI critics debating..."):
        review = analyze_movie(movie)

    st.divider()
    st.markdown(review)